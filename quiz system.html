<!DOCTYPE html>
<html>
<head>
<title>College Online Quiz & Ranking System</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial,sans-serif;
background:#eef2ff;
margin:0;
padding:20px;
}

.container{
width:90%;
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px gray;
}

h1,h2{
text-align:center;
color:navy;
}

input{
width:100%;
padding:12px;
margin:10px 0;
font-size:16px;
box-sizing:border-box;
}

button{
padding:12px 20px;
background:navy;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#000066;
}

#quizBox,
#resultBox,
#leaderboardBox{
display:none;
}

#timer{
text-align:right;
color:red;
font-size:24px;
font-weight:bold;
margin-bottom:20px;
}

.option{
display:flex;
align-items:center;
padding:15px;
margin:10px 0;
border:1px solid gray;
border-radius:8px;
cursor:pointer;
font-size:22px;
}

.option:hover{
background:#dbe4ff;
}

.option input{
margin-right:15px;
width:20px;
height:20px;
flex-shrink:0;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

table,th,td{
border:1px solid black;
}

th,td{
padding:10px;
text-align:center;
}

.certificate{
width:650px;
max-width:90%;
margin:20px auto;
border:8px solid gold;
padding:25px;
border-radius:15px;
background:#fffbea;
text-align:center;
box-sizing:border-box;
}

#showName{
font-size:40px;
font-weight:bold;
color:darkblue;
}

hr{
margin:20px 0;
}

</style>
</head>

<body>

<div class="container">

<h1>🎓 College Online Quiz & Ranking System</h1>

<div id="startBox">

<h3>Student Information</h3>

<input
type="text"
id="studentName"
placeholder="Enter Student Name">

<input
type="text"
id="rollNo"
placeholder="Enter Roll Number">

<button onclick="startQuiz()">
Start Quiz
</button>

</div>

<div id="quizBox">

<h3 id="timer">
Time Left : 60s
</h3>

<h2 id="question"></h2>

<div id="options"></div>

<button onclick="nextQuestion()">
Next Question
</button>

</div>

<div id="resultBox">

<div class="certificate">

<h1>Certificate Of Achievement</h1>

<hr>

<h2>🏆 COLLEGE ONLINE QUIZ 🏆</h2>

<p>
This certificate is awarded to
</p>

<h2 id="showName"></h2>

<p id="showRoll"></p>

<h3 id="showScore"></h3>

<h3 id="showPercentage"></h3>

<h3 id="showGrade"></h3>

<h3 id="showRank"></h3>

<p>
For Successfully Completing The
College Online Quiz
</p>

</div>

</div>

<div id="leaderboardBox">

<h2>🏆 Leaderboard</h2>

<table>

<tr>
<th>Rank</th>
<th>Student Name</th>
<th>Roll No</th>
<th>Score</th>
</tr>

<tbody id="leaderboard">
</tbody>

</table>

</div>

</div>

<script>
var questions=[

{
question:"HTML stands for?",
options:[
"Hyper Text Markup Language",
"High Text Machine Language",
"Home Tool Markup Language",
"Hyper Transfer Markup Language"
],
answer:"Hyper Text Markup Language"
},

{
question:"CSS is used for?",
options:[
"Programming",
"Database",
"Styling Web Pages",
"Networking"
],
answer:"Styling Web Pages"
},

{
question:"JavaScript is a?",
options:[
"Programming Language",
"Database",
"Operating System",
"Compiler"
],
answer:"Programming Language"
},

{
question:"Which tag creates a hyperlink?",
options:[
"&lt;a&gt;",
"&lt;img&gt;",
"&lt;table&gt;",
"&lt;body&gt;"
],
answer:"&lt;a&gt;"
},

{
question:"Which function displays a popup box?",
options:[
"alert()",
"show()",
"print()",
"popup()"
],
answer:"alert()"
},

{
question:"Which symbol is used for ID selector in CSS?",
options:[
"#",
".",
"*",
"$"
],
answer:"#"
},

{
question:"Which tag is used for image?",
options:[
"&lt;img&gt;",
"&lt;image&gt;",
"&lt;pic&gt;",
"&lt;src&gt;"
],
answer:"&lt;img&gt;"
},

{
question:"Which loop executes at least once?",
options:[
"while",
"for",
"do while",
"foreach"
],
answer:"do while"
},

{
question:"JavaScript array stores?",
options:[
"Single Value",
"Multiple Values",
"Only Numbers",
"Only Strings"
],
answer:"Multiple Values"
},

{
question:"DOM stands for?",
options:[
"Document Object Model",
"Data Object Method",
"Document Output Method",
"Display Object Model"
],
answer:"Document Object Model"
}

];

var leaderboard=[];
var currentQuestion=0;
var score=0;
var selectedAnswer="";

var timeLeft=60;
var timer;

function startQuiz(){

var name=document.getElementById("studentName").value;
var roll=document.getElementById("rollNo").value;

if(name=="" || roll==""){
alert("Please Enter Name And Roll Number");
return;
}

currentQuestion=0;
score=0;
selectedAnswer="";

document.getElementById("startBox").style.display="none";
document.getElementById("resultBox").style.display="none";
document.getElementById("quizBox").style.display="block";

loadQuestion();
startTimer();
}

function startTimer(){

timeLeft=60;

document.getElementById("timer").innerHTML=
"Time Left : "+timeLeft+"s";

timer=setInterval(function(){

timeLeft--;

document.getElementById("timer").innerHTML=
"Time Left : "+timeLeft+"s";

if(timeLeft<=0){

clearInterval(timer);

alert("Time Up!");

showResult();
}

},1000);
}

function loadQuestion(){

document.getElementById("question").innerHTML=
(currentQuestion+1)+". "+
questions[currentQuestion].question;

var data="";

for(var i=0;i<questions[currentQuestion].options.length;i++){

data+=
"<label class='option'>"+
"<input type='radio' name='option' value='"+questions[currentQuestion].options[i]+"' onclick='selectAnswer(this.value)'>"+
"<span>"+questions[currentQuestion].options[i]+"</span>"+
"</label>";
}

document.getElementById("options").innerHTML=data;
}

function selectAnswer(value){
selectedAnswer=value;
}

function nextQuestion(){

if(selectedAnswer==""){
alert("Please Select An Option");
return;
}

if(selectedAnswer==
questions[currentQuestion].answer){
score++;
}

currentQuestion++;
selectedAnswer="";

if(currentQuestion<questions.length){
loadQuestion();
}
else{
showResult();
}
}

function showResult(){

clearInterval(timer);

document.getElementById("quizBox").style.display="none";
document.getElementById("resultBox").style.display="block";

var percentage=
(score/questions.length)*100;

var grade="";

if(percentage>=80){
grade="A";
}
else if(percentage>=60){
grade="B";
}
else if(percentage>=40){
grade="C";
}
else{
grade="Fail";
}

var rank="";

if(score>=9){
rank="🥇 Rank 1";
}
else if(score>=7){
rank="🥈 Rank 2";
}
else if(score>=5){
rank="🥉 Rank 3";
}
else{
rank="Participant";
}

var name=
document.getElementById("studentName").value;

var roll=
document.getElementById("rollNo").value;

document.getElementById("showName").innerHTML=
name;

document.getElementById("showRoll").innerHTML=
"Roll Number : "+roll;

document.getElementById("showScore").innerHTML=
"Score : "+score+" / "+questions.length;

document.getElementById("showPercentage").innerHTML=
"Percentage : "+percentage+"%";

document.getElementById("showGrade").innerHTML=
"Grade : "+grade;

document.getElementById("showRank").innerHTML=
rank;

leaderboard.push({
name:name,
roll:roll,
score:score
});

leaderboard.sort(function(a,b){
return b.score-a.score;
});

displayLeaderboard();

alert("Quiz Submitted Successfully");
}

function displayLeaderboard(){

var data="";

for(var i=0;i<leaderboard.length;i++){

data+="<tr>";

if(i==0){
data+="<td>🥇 1</td>";
}
else if(i==1){
data+="<td>🥈 2</td>";
}
else if(i==2){
data+="<td>🥉 3</td>";
}
else{
data+="<td>"+(i+1)+"</td>";
}

data+="<td>"+leaderboard[i].name+"</td>";
data+="<td>"+leaderboard[i].roll+"</td>";
data+="<td>"+leaderboard[i].score+"</td>";

data+="</tr>";
}

document.getElementById("leaderboard").innerHTML=data;
}

</script>

</body>
</html>
